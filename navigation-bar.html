<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .navigation{
            display: flex;
            background-color: goldenrod;
         
            justify-content: flex-end;
            list-style: none;
            flex-wrap: wrap;


        }.navigation a{
            padding: 15px;
            display: block;
            text-decoration: none;
            color:white;
        }.navigation a:hover{
            background-color: rgb(125, 233, 422);

        }@media all and (max-width:800px){
            .navigation{
                justify-content: space-around;
                flex-direction: column;
               
            }.navigation a{
                text-align: center;
                border-bottom: 10px solid rgba(125,255,133,.25);
            }
        }
    </style>
</head>
<body>
    <ul class="navigation">
        <li>
            <a href="#">Home</a>
        </li>
        <li>
            <a href="#">About</a>
        </li>
        <li>
            <a href="#">Products</a>
        </li>
         <li>
            <a href="#">Contact</a>
        </li>
    </ul>
</body>
</html>
